# GitHub Pages への自動デプロイ（Task 27-2）
# main への push で test → build → deploy を実行する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを直列化（進行中のデプロイは完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages 設定の検証（公式スターター workflow と同構成。有効化自体は Settings で手動設定済み）
      - uses: actions/configure-pages@v5
      # node のバージョンは mise.toml を単一の真実源とする（ローカルと CI で共通）
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
