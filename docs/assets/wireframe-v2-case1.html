<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Quiz Battle — ワイヤーフレーム v2 / ケース1（構成維持・CSS刷新）</title>
<style>
/* ============================================================
   デザイントークン（Phase D-1 で src/assets/main.css の @theme へ移植する）
   ============================================================ */
:root {
  /* ステージカラー */
  --c-stage-900: #0b1020;
  --c-stage-800: #131a30;
  --c-stage-700: #1d2742;
  --c-line: #2a3654;
  --c-text: #eef2fa;
  --c-text-dim: #8fa0c2;
  /* シグナルカラー */
  --c-red-500: #e6402e;
  --c-red-600: #c5301f;
  --c-red-700: #9c2317;
  --c-amber-400: #ffc53d;
  --c-amber-600: #d99a14;
  --c-green-400: #3ddc84;
  --c-blue-400: #4f8cff;
  /* 形状 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  /* モーション */
  --dur-fast: 120ms;
  --dur-base: 240ms;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  /* タイマーリング進捗（JSが0〜1で更新） */
  --timer-progress: 1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', Roboto, sans-serif;
  background: #ffffff;
  color: var(--c-text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* ============================================================
   スマホ画面（315x700 — 現行ワイヤーフレームと同寸・同構成）
   ============================================================ */
.phone-screen {
  width: 315px;
  height: 700px;
  background:
    radial-gradient(140% 60% at 50% 108%, rgba(255, 197, 61, 0.10) 0%, transparent 55%),
    linear-gradient(180deg, var(--c-stage-900) 0%, #0d1226 60%, #0a0e1d 100%);
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}

/* ------------------------------------------------ ヘッダー */
.header {
  padding: 10px 12px 8px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 1px solid var(--c-line);
  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
}
.wordmark {
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.wordmark .accent { color: var(--c-amber-400); }
.settings-button {
  background: none;
  border: none;
  color: var(--c-text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
}
.settings-button:hover { color: var(--c-text); background: var(--c-stage-700); }

/* ------------------------------------------------ 動画プレイヤー */
.video-container {
  background: #000;
  height: 177px; /* 315 * 9/16 */
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--c-text-dim);
  font-size: 13px;
  flex-direction: column;
  gap: 2px;
  border-bottom: 1px solid var(--c-line);
}
.video-container.hidden { display: none; }

/* ------------------------------------------------ ゲーム情報（スコアボード） */
.game-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--c-stage-800);
  border-bottom: 1px solid var(--c-line);
}
.progress {
  font-variant-numeric: tabular-nums;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 0.04em;
}
.progress .q-label {
  font-size: 12px;
  color: var(--c-amber-400);
  letter-spacing: 0.2em;
  margin-right: 4px;
  vertical-align: 2px;
}
.progress .total { color: var(--c-text-dim); font-size: 12px; font-weight: 600; }
/* ○×を点灯チップで表現（外周円＋マークを一体の SVG で描画・直近5問ウィンドウ） */
.score-chips { display: flex; align-items: center; gap: 5px; }
.chip {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: block;
  color: var(--c-text-dim);
  --chip-bg: var(--c-stage-700);
  --chip-line: var(--c-line);
}
.chip.correct { color: var(--c-green-400); --chip-bg: rgba(61, 220, 132, 0.16); --chip-line: var(--c-green-400); }
.chip.incorrect { color: var(--c-red-500); --chip-bg: rgba(230, 64, 46, 0.14); --chip-line: var(--c-red-500); }
.chip.skipped { color: var(--c-text-dim); }
.chip.noanswer { color: var(--c-text-dim); }
.chip.current { --chip-line: var(--c-amber-400); box-shadow: 0 0 6px rgba(255, 197, 61, 0.5); }
/* チップ列ページャ（表示ウィンドウ N〜N+4 を前後に動かす三角ボタン） */
.chips-nav {
  width: 14px; height: 16px;
  display: grid; place-items: center;
  background: none; border: none; padding: 0;
  color: var(--c-text-dim);
  cursor: pointer;
}
.chips-nav:hover:not(:disabled) { color: var(--c-text); }
.chips-nav:disabled { opacity: 0.25; cursor: default; }
.chips-nav svg { width: 7px; height: 9px; display: block; }
.chips-nav.prev svg { transform: scaleX(-1); }

/* ------------------------------------------------ メインゲームエリア */
.game-area {
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  min-height: 0;
}

/* ------------------------------------------------ 解答エリア */
.answer-area {
  background: var(--c-stage-800);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  height: 110px;
  display: flex;
  align-items: stretch;
  position: relative;
  overflow: hidden;
  transition: border-color var(--dur-base), box-shadow var(--dur-base);
}
/* 正解/不正解時にエリア全体を縁取りフラッシュ */
.answer-area.flash-correct { border-color: var(--c-green-400); box-shadow: 0 0 18px rgba(61, 220, 132, 0.25); }
.answer-area.flash-incorrect { border-color: var(--c-red-500); box-shadow: 0 0 18px rgba(230, 64, 46, 0.25); }

.guide-text {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 6px;
  font-size: 14px;
  color: var(--c-text-dim);
  line-height: 1.5;
}
/* READY時: ボタンへの視線誘導 */
.guide-text .down-cue {
  font-size: 14px;
  color: var(--c-amber-400);
  animation: bob 1.2s ease-in-out infinite;
}
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(4px); } }

.answer-content {
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.answer-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 26px;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.attempts-counter { color: var(--c-blue-400); font-weight: 700; }
.attempts-counter .dim { color: var(--c-text-dim); font-weight: 500; }

/* タイマー表示パターン1: conic-gradient リング + 残秒数（12時から時計回りに減る） */
.answer-timer { display: flex; align-items: center; gap: 6px; font-weight: 800; color: var(--c-text); }
/* 秒数を固定幅にしてリング位置が桁数で動かないようにする */
.answer-timer .sec { display: inline-block; min-width: 2ch; text-align: right; }
.timer-ring {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: conic-gradient(var(--c-stage-700) calc((1 - var(--timer-progress)) * 360deg), var(--c-amber-400) 0deg);
  display: grid; place-items: center;
}
.timer-ring::after { content: ''; width: 14px; height: 14px; border-radius: 50%; background: var(--c-stage-800); }
.answer-timer.urgent { color: var(--c-red-500); animation: throb 0.5s ease-in-out infinite; }
.answer-timer.urgent .timer-ring {
  background: conic-gradient(var(--c-stage-700) calc((1 - var(--timer-progress)) * 360deg), var(--c-red-500) 0deg);
}
body.timer-pattern-frame .timer-ring { display: none; }

/* タイマー表示パターン2: 解答エリアの枠そのものをメーター化（12時から時計回りに減る） */
.timer-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: none;
}
.timer-frame.on { display: block; }
.timer-frame .frame-track { fill: none; stroke: var(--c-stage-700); stroke-width: 2; }
.timer-frame .frame-fill {
  fill: none;
  stroke: var(--c-amber-400);
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-dasharray: calc(var(--timer-progress) * 100) 100;
  stroke-dashoffset: calc((var(--timer-progress) - 1) * 100);
}
.timer-frame.urgent .frame-fill { stroke: var(--c-red-500); }
/* 枠メーター作動中は元のボーダーを消してトラックに置き換える */
.answer-area.frame-on { border-color: transparent; }
@keyframes throb { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

/* 結果バナー（実装時は aria-live="polite" を付与すること） */
.answer-result {
  position: absolute;
  left: 50%; top: 8px;
  transform: translateX(-50%);
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.08em;
  padding: 3px 14px;
  border-radius: 999px;
  white-space: nowrap;
  animation: pop var(--dur-base) var(--ease-out);
}
@keyframes pop { from { transform: translateX(-50%) scale(0.7); opacity: 0; } }
.answer-result.correct { background: rgba(61, 220, 132, 0.15); color: var(--c-green-400); border: 1px solid var(--c-green-400); }
.answer-result.incorrect { background: rgba(230, 64, 46, 0.15); color: var(--c-red-500); border: 1px solid var(--c-red-500); }

.answer-input-container { display: flex; gap: 8px; }
.answer-input {
  flex: 1; min-width: 0;
  height: 44px;
  padding: 0 14px;
  font-size: 16px; /* iOSズーム防止 */
  color: var(--c-text);
  background: var(--c-stage-900);
  border: 2px solid var(--c-line);
  border-radius: var(--radius-md);
  outline: none;
  transition: border-color var(--dur-fast);
}
.answer-input::placeholder { color: #5a6a8e; }
.answer-input:focus-visible { border-color: var(--c-blue-400); box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.25); }
.answer-input:disabled { opacity: 0.45; }
.submit-button {
  height: 44px;
  padding: 0 16px;
  font-size: 15px; font-weight: 800;
  color: var(--c-stage-900);
  background: var(--c-amber-400);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  flex-shrink: 0;
  transition: transform var(--dur-fast), background var(--dur-fast);
}
.submit-button:hover:not(:disabled) { background: #ffd566; }
.submit-button:active:not(:disabled) { transform: translateY(1px); }
.submit-button:focus-visible { outline: 3px solid rgba(79, 140, 255, 0.6); outline-offset: 2px; }
.submit-button:disabled { background: var(--c-stage-700); color: var(--c-text-dim); cursor: not-allowed; }

/* ------------------------------------------------ 早押しボタン（物理ボタン） */
.quiz-button-container {
  flex: 1;
  min-height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
/* スポットライト: 押せる状態のときだけ点灯 */
.quiz-button-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(60% 55% at 50% 58%, rgba(255, 197, 61, 0.14) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 400ms;
  pointer-events: none;
}
.quiz-button-container.lit::before { opacity: 1; }

.button-rig { position: relative; display: grid; place-items: center; }
/* 台座（真上から見た同心円のベースプレート） */
.button-rig::after {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 196px; height: 196px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, #0e1428 58%, var(--c-stage-700) 78%, #0b1020 100%);
  border: 1px solid var(--c-line);
  z-index: 0;
}
/* QUESTIONING時のパルスリング */
.pulse-ring {
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 2px solid var(--c-amber-400);
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}
.pulse-ring.active { animation: pulse-out 1.4s ease-out infinite; }
@keyframes pulse-out {
  0% { transform: scale(0.95); opacity: 0.7; }
  100% { transform: scale(1.35); opacity: 0; }
}

/* 真上から見たドーム型キャップ。沈み込みは縮小＋内側影＋減光で表現 */
.quiz-button {
  position: relative;
  z-index: 2;
  width: 150px; height: 150px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 19px; font-weight: 800; letter-spacing: 0.12em;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.30) 0%, transparent 50%),
    radial-gradient(circle, var(--c-red-500) 55%, var(--c-red-600) 80%, var(--c-red-700) 100%);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.35),           /* ソケットの隙間 */
    0 8px 22px rgba(0, 0, 0, 0.55);          /* 浮き上がりの柔らかい影 */
  transition: transform var(--dur-fast), box-shadow var(--dur-fast), filter var(--dur-base);
}
.quiz-button:focus-visible { outline: 3px solid rgba(79, 140, 255, 0.7); outline-offset: 4px; }
.quiz-button.standby:hover { filter: brightness(1.08); }
.quiz-button.standby:active,
.quiz-button.pushed {
  transform: scale(0.93);
  filter: brightness(0.88);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.35),
    0 2px 6px rgba(0, 0, 0, 0.4),
    inset 0 0 22px rgba(0, 0, 0, 0.45);
}
/* RELEASED: LEDリング点灯（解答権取得） */
.quiz-button.released {
  transform: scale(0.96);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.35),
    0 3px 10px rgba(0, 0, 0, 0.45),
    inset 0 0 14px rgba(0, 0, 0, 0.3),
    0 0 0 10px rgba(61, 220, 132, 0.85),
    0 0 28px 10px rgba(61, 220, 132, 0.45);
  animation: led-breathe 1.2s ease-in-out infinite;
}
@keyframes led-breathe {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.15); }
}
/* DISABLED: 暗転して沈んだまま */
.quiz-button.disabled,
.quiz-button:disabled {
  cursor: not-allowed;
  transform: scale(0.93);
  filter: grayscale(0.85) brightness(0.55);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.35),
    inset 0 0 22px rgba(0, 0, 0, 0.5);
}

/* ------------------------------------------------ FINISHED: フルスクリーンのリザルトステージ（ケース2と共通デザイン） */
.finished-overlay {
  position: absolute; inset: 0;
  z-index: 500;
  background:
    radial-gradient(120% 50% at 50% 0%, rgba(255, 197, 61, 0.12) 0%, transparent 60%),
    linear-gradient(180deg, #0d1226 0%, var(--c-stage-900) 100%);
  display: none;
  flex-direction: column;
  padding: 28px 18px 18px;
  border-radius: 14px;
}
.finished-overlay.show { display: flex; }
.final-title { text-align: center; font-size: 13px; letter-spacing: 0.3em; color: var(--c-amber-400); font-weight: 800; }
.final-score {
  text-align: center;
  margin: 14px 0 4px;
  font-variant-numeric: tabular-nums;
}
.final-score .num { font-size: 56px; font-weight: 800; line-height: 1; }
.final-score .den { font-size: 20px; color: var(--c-text-dim); font-weight: 700; }
.final-rate { text-align: center; color: var(--c-text-dim); font-size: 13px; margin-bottom: 18px; }
.final-rate .pct { color: var(--c-amber-400); font-weight: 800; }
/* 問題別タイムライン（スクロールバーは矢印なしの細バー・バーとリストの間隔を確保） */
.result-list {
  flex: 1; min-height: 0; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
  padding-left: 10px;
  padding-right: 6px; /* バー(4px) + 6px = 左の 10px と釣り合い、行が中央を保つ */
  scrollbar-gutter: stable;
}
.result-list::-webkit-scrollbar { width: 4px; }
.result-list::-webkit-scrollbar-thumb { background: var(--c-stage-700); border-radius: 4px; }
.result-list::-webkit-scrollbar-track { background: transparent; }
.result-list::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
/* WebKit 疑似要素が効かない環境（Firefox）向け */
@supports not selector(::-webkit-scrollbar) {
  .result-list { scrollbar-width: thin; scrollbar-color: var(--c-stage-700) transparent; }
}
.result-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--c-stage-800);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-md);
  padding: 9px 12px;
  font-size: 12px;
}
.result-row .mark { width: 24px; height: 24px; border-radius: 50%; display: block; flex-shrink: 0; }
.result-row .mark.o { color: var(--c-green-400); --chip-bg: rgba(61,220,132,0.15); --chip-line: var(--c-green-400); }
.result-row .mark.x { color: var(--c-red-500); --chip-bg: rgba(230,64,46,0.13); --chip-line: var(--c-red-500); }
.result-row .mark.s { color: var(--c-text-dim); --chip-bg: var(--c-stage-700); --chip-line: var(--c-line); }
.result-row .mark.n { color: var(--c-text-dim); --chip-bg: var(--c-stage-700); --chip-line: var(--c-line); }
.result-row .body { min-width: 0; }
.result-row .ans { font-weight: 700; }
.result-row .yours { color: var(--c-text-dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-row .qno { margin-left: auto; color: var(--c-text-dim); font-size: 10px; flex-shrink: 0; }
.replay-button {
  margin-top: 14px;
  height: 48px;
  border: none; border-radius: var(--radius-md);
  background: var(--c-red-500);
  color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 0.08em;
  cursor: pointer;
}
.replay-button:hover { background: #f0523f; }
.replay-button:active { filter: brightness(0.9); }

/* ------------------------------------------------ ダイアログ */
.dialog-overlay {
  position: absolute; inset: 0;
  background: rgba(5, 8, 18, 0.72);
  backdrop-filter: blur(2px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 2000;
  border-radius: 14px;
}
.dialog-overlay.show { display: flex; }
.dialog {
  background: var(--c-stage-800);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  padding: 26px 22px;
  margin: 20px;
  text-align: center;
  max-width: 270px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
}
.dialog h3 { font-size: 16px; margin-bottom: 10px; }
.dialog p { color: var(--c-text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 18px; }
.dialog-button {
  padding: 10px 22px;
  background: var(--c-amber-400);
  color: var(--c-stage-900);
  border: none; border-radius: var(--radius-md);
  cursor: pointer; font-weight: 800; font-size: 14px;
}
.dialog-button:hover { background: #ffd566; }
.loading-spinner {
  width: 44px; height: 44px;
  border: 4px solid var(--c-stage-700);
  border-top-color: var(--c-amber-400);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ------------------------------------------------ reduced-motion 対応 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ============================================================
   デモコントロール（ワイヤーフレーム確認用 — 製品には含めない）
   ============================================================ */
.demo-controls {
  background: #20262f;
  color: white;
  padding: 16px;
  border-radius: 8px;
  width: 200px;
  max-height: 90vh;
  overflow-y: auto;
  font-size: 12px;
}
.demo-controls h4 { margin-bottom: 12px; font-size: 13px; text-align: center; color: #e5e7eb; }
.demo-section { margin-bottom: 14px; }
.demo-section-title { font-size: 11px; color: #9aa4b2; margin-bottom: 6px; font-weight: bold; }
.demo-button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.demo-button-full { display: grid; gap: 6px; }
.demo-button {
  padding: 8px 6px; background: #353d49; color: white;
  border: none; border-radius: 4px; font-size: 10px; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.demo-button:hover { background: #475160; }
.demo-button.active { background: #d99a14; color: #14181f; font-weight: 700; }
.demo-info { background: #353d49; padding: 8px; border-radius: 4px; font-size: 10px; color: #c9d2dd; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ○×− チップアイコン定義（外周円＋マークを一体の SVG で描画・フォント非依存） -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="chip-o" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7.25" fill="var(--chip-bg, transparent)" stroke="var(--chip-line, currentColor)"/>
      <circle cx="8" cy="8" r="3.4" fill="none" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
    <symbol id="chip-x" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7.25" fill="var(--chip-bg, transparent)" stroke="var(--chip-line, currentColor)"/>
      <path d="M5.3 5.3 L10.7 10.7 M10.7 5.3 L5.3 10.7" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </symbol>
    <symbol id="chip-s" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7.25" fill="var(--chip-bg, transparent)" stroke="var(--chip-line, currentColor)"/>
      <path d="M5.4 8 H10.6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </symbol>
    <symbol id="chip-n" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7.25" fill="var(--chip-bg, transparent)" stroke="var(--chip-line, currentColor)"/>
      <circle cx="8" cy="8" r="1.7" fill="currentColor"/>
    </symbol>
    <symbol id="chip-empty" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7.25" fill="var(--chip-bg, transparent)" stroke="var(--chip-line, currentColor)"/>
    </symbol>
    <symbol id="tri" viewBox="0 0 10 12">
      <path d="M2.5 1.5 L8.5 6 L2.5 10.5 Z" fill="currentColor"/>
    </symbol>
  </defs>
</svg>

<div class="phone-screen">
  <!-- ローディングダイアログ -->
  <div class="dialog-overlay" id="loadingDialog">
    <div class="dialog">
      <div class="loading-spinner"></div>
      <h3>読み込み中...</h3>
      <p>クイズデータを準備しています</p>
    </div>
  </div>

  <!-- 横画面警告ダイアログ -->
  <div class="dialog-overlay" id="orientationDialog">
    <div class="dialog">
      <h3>画面を縦向きにしてください</h3>
      <p>このゲームは縦画面専用です。<br>より良い体験のために画面を回転させてください。</p>
      <button class="dialog-button" onclick="hideDialog('orientation')">OK</button>
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="header">
    <span class="wordmark">YouTube <span class="accent">Quiz Battle</span></span>
    <button class="settings-button" aria-label="設定">⚙</button>
  </div>

  <!-- 動画プレイヤー -->
  <div class="video-container" id="videoContainer">
    YouTube Video Player
    <small>(16:9 aspect ratio)</small>
  </div>

  <!-- ゲーム情報（スコアボード） -->
  <div class="game-info" id="gameInfo">
    <div class="progress">
      <span class="q-label">Q</span><span id="progressNum">03</span><span class="total" id="progressTotal"> / 05</span>
    </div>
    <!-- ○×と進行を点灯チップで表現（直近5問ウィンドウ・JSが描画） -->
    <div class="score-chips" id="scoreChips"></div>
  </div>

  <!-- メインゲームエリア -->
  <div class="game-area">
    <!-- 解答エリア -->
    <div class="answer-area" id="answerArea">
      <!-- タイマー表示パターン2: 枠メーター（ANSWERING 中のみ表示・12時起点で時計回りに減る） -->
      <svg class="timer-frame" id="timerFrame" viewBox="0 0 291 110" aria-hidden="true">
        <path class="frame-track" d="M145.5 1 L273 1 A17 17 0 0 1 290 18 L290 92 A17 17 0 0 1 273 109 L18 109 A17 17 0 0 1 1 92 L1 18 A17 17 0 0 1 18 1 Z" pathLength="100"/>
        <path class="frame-fill" d="M145.5 1 L273 1 A17 17 0 0 1 290 18 L290 92 A17 17 0 0 1 273 109 L18 109 A17 17 0 0 1 1 92 L1 18 A17 17 0 0 1 18 1 Z" pathLength="100"/>
      </svg>
      <!-- ガイドテキスト（LOADING/READY/TALKING状態用） -->
      <div class="guide-text" id="guideText">
        <span id="guideMessage">ボタンを押してゲームを開始</span>
        <span class="down-cue" id="downCue">▼</span>
      </div>

      <!-- 解答コンテンツ（QUESTIONING/ANSWERING/WAITING/REVEALING状態用） -->
      <div class="answer-content" id="answerContent" style="display:none;">
        <div class="answer-meta">
          <span class="attempts-counter">残り <span id="attemptsNum">2</span>回<span class="dim"> / 3</span></span>
          <!-- 実装時: answer-result 要素に aria-live="polite" を付与 -->
          <span class="answer-timer hidden" id="answerTimer">
            <span class="timer-ring"></span>
            <span class="sec" id="timerSec">10</span>s
          </span>
        </div>
        <div class="answer-result hidden" id="answerResult">正解！</div>
        <div class="answer-input-container">
          <input type="text" class="answer-input" placeholder="解答を入力" id="answerInput" maxlength="100">
          <button class="submit-button" id="submitButton">送信</button>
        </div>
      </div>
    </div>

    <!-- 早押しボタン -->
    <div class="quiz-button-container" id="buttonContainer">
      <div class="button-rig">
        <div class="pulse-ring" id="pulseRing"></div>
        <button class="quiz-button standby" id="quizButton">PUSH</button>
      </div>
    </div>
  </div>

  <!-- FINISHED: フルスクリーンリザルト（ケース2と共通デザイン・JSが行を描画） -->
  <div class="finished-overlay" id="finishedOverlay">
    <div class="final-title">RESULT</div>
    <div class="final-score"><span class="num" id="finalScoreNum">3</span><span class="den" id="finalScoreDen"> / 5</span></div>
    <div class="final-rate">正解率 <span class="pct" id="finalRatePct">60%</span></div>
    <div class="result-list" id="resultList"></div>
    <button class="replay-button" onclick="setState('ready')">もう一度プレイ</button>
  </div>
</div>

<!-- デモコントロール -->
<div class="demo-controls">
  <h4>🎮 デモコントロール</h4>
  <div class="demo-section">
    <div class="demo-section-title">ゲーム状態:</div>
    <div class="demo-button-grid">
      <button class="demo-button" onclick="setState('loading', this)">LOADING</button>
      <button class="demo-button active" onclick="setState('ready', this)">READY</button>
      <button class="demo-button" onclick="setState('talking', this)">TALKING</button>
      <button class="demo-button" onclick="setState('questioning', this)">QUESTIONING</button>
      <button class="demo-button" onclick="setState('answering', this)">ANSWERING</button>
      <button class="demo-button" onclick="setState('waiting', this)">WAITING</button>
      <button class="demo-button" onclick="setState('revealing', this)">REVEALING</button>
      <button class="demo-button" onclick="setState('finished', this)">FINISHED</button>
    </div>
  </div>
  <div class="demo-section">
    <div class="demo-section-title">ボタン状態:</div>
    <div class="demo-button-grid">
      <button class="demo-button" onclick="setButtonState('standby')">STANDBY</button>
      <button class="demo-button" onclick="setButtonState('pushed')">PUSHED</button>
      <button class="demo-button" onclick="setButtonState('released')">RELEASED</button>
      <button class="demo-button" onclick="setButtonState('disabled')">DISABLED</button>
    </div>
  </div>
  <div class="demo-section">
    <div class="demo-section-title">タイマー表示:</div>
    <div class="demo-button-grid">
      <button class="demo-button keep active" onclick="setTimerPattern('ring', this)">① リング</button>
      <button class="demo-button keep" onclick="setTimerPattern('frame', this)">② 枠メーター</button>
    </div>
  </div>
  <div class="demo-section">
    <div class="demo-section-title">問題数:</div>
    <div class="demo-button-grid">
      <button class="demo-button keep active" onclick="setQuestionCount(5, this)">5問</button>
      <button class="demo-button keep" onclick="setQuestionCount(10, this)">10問</button>
    </div>
  </div>
  <div class="demo-section">
    <div class="demo-section-title">ダイアログ:</div>
    <div class="demo-button-full">
      <button class="demo-button" onclick="showDialog('loading')">ローディング</button>
      <button class="demo-button" onclick="showDialog('orientation')">横画面警告</button>
    </div>
  </div>
  <div class="demo-section">
    <div class="demo-section-title">アクション:</div>
    <div class="demo-button-full">
      <button class="demo-button" onclick="showResult(true)">正解表示</button>
      <button class="demo-button" onclick="showResult(false)">不正解表示</button>
      <button class="demo-button" onclick="startCountdown()">カウントダウン</button>
      <button class="demo-button" onclick="hideVideoPlayer()">動画非表示</button>
      <button class="demo-button" onclick="resetFlow()">フロー初期化</button>
    </div>
  </div>
  <div class="demo-info">
    <strong>現在の状態:</strong><br>
    <span id="currentStateInfo">READY</span>
  </div>
</div>

<script>
let currentState = 'ready';
let countdownTimer = null;
const COUNTDOWN_TOTAL = 10;
let countdownValue = COUNTDOWN_TOTAL;
let timerPattern = 'ring'; // 'ring' | 'frame'
let questionCount = 5;

const el = (id) => document.getElementById(id);
const pad2 = (n) => String(n).padStart(2, '0');

/* チップ列は「直近5問のスライディングウィンドウ」で表示する。
   位置情報は Q カウンタが担い、チップ列は直近の戦績（モメンタム）を担う。
   ウィンドウ外に問題がある側には省略ドットを出す。 */
const CHIP_WINDOW = 5;
const DEMOS = {
  5: {
    current: 3,
    finalResults: [
      { mark: 'o', ans: 'あまおう', yours: 'あなた: あまおう' },
      { mark: 'x', ans: '小豆', yours: 'あなた: 大豆' },
      { mark: 'o', ans: 'ペタロイド', yours: 'あなた: ぺたろいど' },
      { mark: 's', ans: '300', yours: 'スキップ' },
      { mark: 'o', ans: '風の又三郎', yours: 'あなた: 風の又三郎' },
    ],
  },
  10: {
    current: 7,
    finalResults: [
      { mark: 'o', ans: 'あまおう', yours: 'あなた: あまおう' },
      { mark: 'x', ans: '小豆', yours: 'あなた: 大豆' },
      { mark: 'o', ans: 'ペタロイド', yours: 'あなた: ぺたろいど' },
      { mark: 's', ans: '300', yours: 'スキップ' },
      { mark: 'o', ans: '風の又三郎', yours: 'あなた: 風の又三郎' },
      { mark: 'x', ans: 'カピバラ', yours: 'あなた: ヌートリア' },
      { mark: 'o', ans: '太平洋', yours: 'あなた: たいへいよう' },
      { mark: 'o', ans: 'シリウス', yours: 'あなた: シリウス' },
      { mark: 'n', ans: '1192', yours: 'あなた: ' },
      { mark: 'x', ans: 'モルダウ', yours: 'あなた: ドナウ' },
    ],
  },
};

let chipStart = null; // null = 現在の問題に自動追従

function chipSvg(cls, ref) {
  return `<svg class="chip${cls ? ' ' + cls : ''}" aria-hidden="true"><use href="${ref}"/></svg>`;
}

function navBtn(dir, disabled) {
  const label = dir === 'prev' ? '前の結果' : '次の結果';
  return `<button class="chips-nav ${dir}" onclick="moveChips(${dir === 'prev' ? -1 : 1})"${disabled ? ' disabled' : ''} aria-label="${label}"><svg aria-hidden="true"><use href="#tri"/></svg></button>`;
}

/* 右端は「現在の問題が右端に来る位置」まで。それより先（未来の問題）へは送れない */
function maxChipStart() {
  return Math.max(1, DEMOS[questionCount].current - CHIP_WINDOW + 1);
}

function autoChipStart() {
  return maxChipStart();
}

function moveChips(delta) {
  chipStart = Math.min(maxChipStart(), Math.max(1, (chipStart ?? autoChipStart()) + delta));
  renderChips();
}

function renderChips() {
  const { current, finalResults } = DEMOS[questionCount];
  const total = finalResults.length;
  const start = chipStart ?? autoChipStart();
  const end = Math.min(total, start + CHIP_WINDOW - 1);
  let html = total > CHIP_WINDOW ? navBtn('prev', start === 1) : '';
  for (let q = start; q <= end; q++) {
    if (q === current) {
      html += chipSvg('current', '#chip-empty');
    } else if (q < current) {
      const m = finalResults[q - 1].mark;
      const cls = { o: 'correct', x: 'incorrect', s: 'skipped', n: 'noanswer' }[m];
      html += chipSvg(cls, `#chip-${m}`);
    } else {
      html += chipSvg('', '#chip-empty');
    }
  }
  if (total > CHIP_WINDOW) html += navBtn('next', start === maxChipStart());
  el('scoreChips').innerHTML = html;
  el('progressNum').textContent = pad2(current);
  el('progressTotal').textContent = ' / ' + pad2(total);
}

function renderFinished() {
  const { finalResults } = DEMOS[questionCount];
  const total = finalResults.length;
  const score = finalResults.filter((r) => r.mark === 'o').length;
  el('finalScoreNum').textContent = score;
  el('finalScoreDen').textContent = ' / ' + total;
  el('finalRatePct').textContent = Math.round((score / total) * 100) + '%';
  el('resultList').innerHTML = finalResults.map((r, i) => `
    <div class="result-row">
      <svg class="mark ${r.mark}" aria-hidden="true"><use href="#chip-${r.mark}"/></svg>
      <span class="body"><span class="ans">${r.ans}</span><br><span class="yours">${r.yours}</span></span>
      <span class="qno">Q${i + 1}</span>
    </div>`).join('');
}

function markKeepActive(btn) {
  btn.parentElement.querySelectorAll('.demo-button').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
}

function setQuestionCount(n, btn) {
  questionCount = n;
  chipStart = null;
  renderChips();
  renderFinished();
  markKeepActive(btn);
}

function setTimerPattern(pattern, btn) {
  timerPattern = pattern;
  document.body.classList.toggle('timer-pattern-frame', pattern === 'frame');
  syncTimerFrame();
  markKeepActive(btn);
}

function syncTimerFrame() {
  const active = currentState === 'answering' && timerPattern === 'frame';
  el('timerFrame').classList.toggle('on', active);
  el('answerArea').classList.toggle('frame-on', active);
}

function setGuide(message, showCue) {
  el('guideText').style.display = 'flex';
  el('answerContent').style.display = 'none';
  el('guideMessage').textContent = message;
  el('downCue').classList.toggle('hidden', !showCue);
}

function setAnswerMode(inputEnabled) {
  el('guideText').style.display = 'none';
  el('answerContent').style.display = 'flex';
  el('answerInput').disabled = !inputEnabled;
  el('submitButton').disabled = !inputEnabled;
}

function setState(state, targetButton = null) {
  currentState = state;
  el('answerResult').classList.add('hidden');
  el('answerArea').classList.remove('flash-correct', 'flash-incorrect');
  el('answerTimer').classList.add('hidden');
  el('finishedOverlay').classList.remove('show');
  stopCountdown();
  el('pulseRing').classList.remove('active');
  el('buttonContainer').classList.remove('lit');
  if (state !== 'loading') el('videoContainer').classList.remove('hidden');

  switch (state) {
    case 'loading':
      el('loadingDialog').classList.add('show');
      setButtonState('disabled', '...');
      setGuide('読み込み中...', false);
      break;
    case 'ready':
      el('loadingDialog').classList.remove('show');
      setButtonState('standby', 'PUSH');
      setGuide('ボタンを押してゲームを開始', true);
      el('buttonContainer').classList.add('lit');
      break;
    case 'talking':
      setButtonState('disabled', 'WAIT');
      setGuide('次の問題をお待ちください', false);
      break;
    case 'questioning':
      setButtonState('standby', 'PUSH');
      setAnswerMode(false);
      el('answerInput').value = '';
      el('pulseRing').classList.add('active');
      el('buttonContainer').classList.add('lit');
      break;
    case 'answering':
      setButtonState('released', 'ON!');
      setAnswerMode(true);
      el('answerTimer').classList.remove('hidden');
      el('answerInput').focus();
      startCountdown();
      break;
    case 'waiting':
      setButtonState('disabled', 'WAIT');
      setAnswerMode(false);
      break;
    case 'revealing':
      setButtonState('disabled', 'ANSWER');
      setAnswerMode(false);
      break;
    case 'finished':
      setButtonState('disabled', 'END');
      setGuide('ゲーム終了', false);
      el('finishedOverlay').classList.add('show');
      break;
  }

  syncTimerFrame();
  document.querySelectorAll('.demo-button:not(.keep)').forEach((b) => b.classList.remove('active'));
  if (targetButton) targetButton.classList.add('active');
  el('currentStateInfo').textContent = state.toUpperCase();
}

function setButtonState(state, label) {
  const btn = el('quizButton');
  btn.className = `quiz-button ${state}`;
  btn.disabled = state === 'disabled';
  if (label) btn.textContent = label;
}

function showResult(isCorrect) {
  if (currentState === 'questioning' || currentState === 'answering') return;
  const result = el('answerResult');
  result.className = `answer-result ${isCorrect ? 'correct' : 'incorrect'}`;
  result.textContent = isCorrect ? '正解！' : '不正解';
  result.classList.remove('hidden');
  el('answerArea').classList.remove('flash-correct', 'flash-incorrect');
  el('answerArea').classList.add(isCorrect ? 'flash-correct' : 'flash-incorrect');
}

function startCountdown() {
  if (currentState !== 'answering') return;
  stopCountdown();
  countdownValue = COUNTDOWN_TOTAL;
  updateTimer();
  countdownTimer = setInterval(() => {
    countdownValue -= 0.1;
    updateTimer();
    if (countdownValue <= 0) {
      stopCountdown();
      el('timerSec').textContent = '0';
    }
  }, 100);
}

function updateTimer() {
  const sec = Math.max(0, Math.ceil(countdownValue));
  el('timerSec').textContent = sec;
  document.documentElement.style.setProperty('--timer-progress', Math.max(0, countdownValue / COUNTDOWN_TOTAL));
  const urgent = sec <= 3;
  el('answerTimer').classList.toggle('urgent', urgent);
  el('timerFrame').classList.toggle('urgent', urgent);
}

function stopCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function hideVideoPlayer() {
  if (currentState !== 'answering') return;
  el('videoContainer').classList.toggle('hidden');
}

function resetFlow() {
  el('answerInput').value = '';
  setState('ready');
}

function showDialog(type) {
  el(type === 'loading' ? 'loadingDialog' : 'orientationDialog').classList.add('show');
}
function hideDialog(type) {
  el(type === 'loading' ? 'loadingDialog' : 'orientationDialog').classList.remove('show');
}

el('quizButton').addEventListener('click', function () {
  if (currentState === 'ready') {
    setState('talking');
  } else if (currentState === 'questioning' && !this.disabled) {
    setState('answering');
  }
});
el('submitButton').addEventListener('click', function () {
  if (currentState === 'answering') {
    setState('waiting');
    showResult(true);
  }
});
el('answerInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !el('submitButton').disabled) el('submitButton').click();
});
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && (currentState === 'ready' || currentState === 'questioning')) {
    e.preventDefault();
    el('quizButton').click();
  }
});

renderChips();
renderFinished();
setState('ready');
</script>
</body>
</html>
